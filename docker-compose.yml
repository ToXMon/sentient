services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - ADMIN_API_KEY=dev-key-change-me
      - IP_HASH_SALT=dev-salt-change-me
      - ENABLE_DEV_CORS=true
      - ENABLE_DOCS=true
      - DB_DIR=/data
    volumes:
      - api-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  landing:
    image: nginx:1.25-alpine
    ports:
      - "3000:80"
    volumes:
      - ./landing:/usr/share/nginx/html:ro

volumes:
  api-data:
